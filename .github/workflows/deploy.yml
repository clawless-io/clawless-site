name: Deploy to Cloudflare Pages

# Runs on every push to main and on manual trigger from the Actions tab.
# The job builds the Next.js static export and uploads the resulting `out/`
# directory to the existing Cloudflare Pages project `clawless-site`.
#
# Auth: requires the GitHub repository secret `CLOUDFLARE_API_TOKEN`
# (Cloudflare API token with `Account > Cloudflare Pages > Edit` and
# `User > User Details > Read` permissions). The Cloudflare account ID is
# hardcoded below because it is not a secret, just an identifier.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Per-ref concurrency: pushes to the same branch serialize so they don't race
# on the Cloudflare Pages project. cancel-in-progress: false preserves the
# "every push deploys" contract; later pushes queue behind earlier ones rather
# than replacing them, so an intermediate commit is never skipped.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pin to a minor to avoid a silent Bun-level breakage (lockfile format
          # change, behavior change in `bun test`, etc.) landing on `latest` and
          # turning CI red without a code change on our side. Bump deliberately
          # in a dedicated PR.
          bun-version: 1.3.x

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck (site + pages functions)
        run: bun run typecheck

      - name: Unit tests (pages functions)
        run: bun run test

      - name: Build static export
        run: bun run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Public account ID for Jaysidd@yahoo.com's Cloudflare account.
          # Not a secret; safe to commit. Visible in `wrangler whoami`.
          accountId: 8368028f1f2560ac1ad853ef0452bd30
          command: pages deploy out --project-name=clawless-site --branch=main
