<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#22FFAA"/>
    </linearGradient>
    <linearGradient id="brand-subtle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22FFAA" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- Dark rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="#05070F"/>

  <!-- Subtle inner border glow -->
  <rect x="8" y="8" width="496" height="496" rx="88" ry="88"
        fill="none" stroke="url(#brand)" stroke-width="3" opacity="0.3"/>

  <!-- The mark: a stylized "C" formed by an arc with a clean gap -->
  <!-- The arc represents the open, companion nature of the product -->
  <!-- The gap (missing piece) = "clawless" — the claw that isn't there -->
  <g transform="translate(256, 256)">
    <!-- Outer arc (the main C shape) -->
    <path
      d="M 80,-140
         A 160,160 0 1,0 80,140"
      fill="none"
      stroke="url(#brand)"
      stroke-width="52"
      stroke-linecap="round"
    />

    <!-- Small accent dot at the gap opening — signals "computer/cursor" -->
    <circle cx="108" cy="-158" r="14" fill="#00D4FF"/>
    <circle cx="108" cy="158" r="14" fill="#22FFAA"/>
  </g>
</svg>
